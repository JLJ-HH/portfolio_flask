{% extends "ob_layout.html" %}

{% block lib_content %}
<h2>Neues Passwort festlegen</h2>
<p>Erstellen Sie ein Passwort für Ihr Konto (E-Mail: <strong>{{ email }}</strong>):</p>

{% if meldung %}
    <p class="alert alert-danger">{{ meldung }}</p>
{% endif %}

<form method="post" action="{{ url_for('online_bibliothek.passwort_erstellen') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <p>Neues Passwort:<br>
        <input type="password" name="passwort" required minlength="6" autofocus style="width: 250px;">
    </p>
    <p>Passwort wiederholen:<br>
        <input type="password" name="passwort_wdh" required minlength="6" style="width: 250px;">
    </p>
    <p>
        <button type="submit">Passwort speichern & Account aktivieren</button>
    </p>
</form>
{% endblock %}
