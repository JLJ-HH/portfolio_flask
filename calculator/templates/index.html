<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCalc - Wissenschaftlicher Taschenrechner</title>
    <meta name="description" content="Ein moderner, wissenschaftlicher Taschenrechner mit Flask und Clean Code.">
    <!-- Google Fonts: Inter for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('calculator.static', filename='css/style.css') }}">
</head>
<body class="light-mode">
    <div class="container">
        <!-- Calculator Card -->
        <main class="calculator">
            <header class="calculator-header">
                <h1>SmartCalc</h1>
                <button id="theme-toggle" class="icon-btn" title="Dark/Light Mode umschalten">
                    <span id="theme-icon">🌙</span>
                </button>
            </header>

            <!-- Display Area -->
            <section class="display-container">
                <input type="text" id="calc-display" readonly placeholder="0" aria-label="Rechner Display">
            </section>

            <!-- Button Grid -->
            <section class="button-grid">
                <!-- Special Row 1 -->
                <button class="btn btn-danger" onclick="clearDisplay()">C</button>
                <button class="btn btn-warning" onclick="deleteLast()">DEL</button>
                <button class="btn btn-operator" onclick="append('(')">(</button>
                <button class="btn btn-operator" onclick="append(')')">)</button>
                <button class="btn btn-operator" onclick="append('/')">/</button>

                <!-- Numbers and Operators -->
                <button class="btn" onclick="append('7')">7</button>
                <button class="btn" onclick="append('8')">8</button>
                <button class="btn" onclick="append('9')">9</button>
                <button class="btn btn-operator" onclick="append('*')">×</button>
                <button class="btn btn-operator" onclick="append('^')">^</button>

                <button class="btn" onclick="append('4')">4</button>
                <button class="btn" onclick="append('5')">5</button>
                <button class="btn" onclick="append('6')">6</button>
                <button class="btn btn-operator" onclick="append('-')">-</button>
                <button class="btn btn-operator" onclick="append('√')">√</button>

                <button class="btn" onclick="append('1')">1</button>
                <button class="btn" onclick="append('2')">2</button>
                <button class="btn" onclick="append('3')">3</button>
                <button class="btn btn-operator" onclick="append('+')">+</button>
                <button class="btn btn-operator" onclick="append('%')">%</button>

                <!-- Bottom Row -->
                <button class="btn" onclick="append('0')">0</button>
                <button class="btn" onclick="append('.')">.</button>
                <button class="btn btn-constant" onclick="append('π')">π</button>
                <button class="btn btn-constant" onclick="append('e')">e</button>
                <button class="btn btn-success" id="btn-equals" onclick="calculate()">=</button>
            </section>

            <!-- Scientific Functions Overlay/Section -->
            <section class="scientific-grid">
                <button class="btn btn-sci" onclick="append('sin(')">sin</button>
                <button class="btn btn-sci" onclick="append('cos(')">cos</button>
                <button class="btn btn-sci" onclick="append('tan(')">tan</button>
                <button class="btn btn-sci" onclick="append('log(')">log</button>
                <button class="btn btn-sci" onclick="append('ln(')">ln</button>
                <button class="btn btn-sci" onclick="append('exp(')">exp</button>
                <button class="btn btn-sci" onclick="append('arcsin(')">asin</button>
                <button class="btn btn-sci" onclick="append('arccos(')">acos</button>
                <button class="btn btn-sci" onclick="append('arctan(')">atan</button>
            </section>
        </main>

        <!-- Sidebar for History -->
        <aside class="history-panel">
            <header class="history-header">
                <h2>Verlauf</h2>
                <button onclick="clearHistory()" class="text-btn">Löschen</button>
            </header>
            <div id="history-list" class="history-list">
                <!-- History items will be injected here -->
                <p class="empty-msg">Noch keine Berechnungen.</p>
            </div>
        </aside>
    </div>

    <!-- JavaScript Bundle -->
    <script src="{{ url_for('calculator.static', filename='js/script.js') }}"></script>
</body>
</html>
