{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/about.css') }}?v=1.2">
{% endblock %}

{% block content %}
<div class="about-hero-container">
    <div class="about-hero-image">
        <img src="{{ url_for('static', filename='images/OIP.png') }}" alt="José Luis Juárez">
    </div>
    
    <div class="about-hero-content">
        <div class="about-text-minimal">{% if about_text and about_text.strip() %}{{ about_text|safe }}{% else %}<p>José Luis Juárez. Anwendungsentwickler.</p>{% endif %}<div class="about-cta-minimal"><a href="{{ url_for('contact') }}" class="btn-minimal">Kontakt aufnehmen</a></div></div>
    </div>
</div>
{% endblock %}
